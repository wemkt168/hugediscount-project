<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Huge Discount - Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header {
      text-align: center;
      margin-bottom: 25px;
    }
    .header h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }
    .header p {
      color: #666;
      font-size: 14px;
    }
    .question-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .question-text {
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
    }
    .math-display {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      letter-spacing: 4px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .answer-input {
      width: 100%;
      padding: 15px;
      font-size: 24px;
      text-align: center;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.3s;
    }
    .answer-input:focus {
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .hidden { display: none; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .honeypot { display: none !important; }
    #redirect-msg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="redirect-msg" class="hidden">
    <div style="text-align:center">
      <div class="spinner" style="margin-bottom:15px"></div>
      <div>Verifying your device...</div>
    </div>
  </div>

  <div class="card" id="quiz-card">
    <div class="header">
      <h1>🎁 Huge Discount Event</h1>
      <p>Answer the question to unlock your reward!</p>
    </div>

    <div class="question-box">
      <div class="question-text">What is the result?</div>
      <div class="math-display" id="math-question">3 + 4 = ?</div>
    </div>

    <div class="input-group">
      <label>Your Answer</label>
      <input type="number" class="answer-input" id="answer-input" placeholder="?" autocomplete="off">
    </div>

    <!-- Honeypot field - hidden from real users -->
    <div class="honeypot">
      <label>Leave this empty: </label>
      <input type="text" id="honeypot" name="website" autocomplete="off">
    </div>

    <!-- Hidden fields for silent verify on page load -->
    <input type="hidden" id="silent-data" name="silent_data" value="">

    <button class="btn" id="submit-btn">Submit Answer</button>
  </div>

  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <div>Verifying...</div>
  </div>

  <!-- Hidden iframe for form-based redirect (Meta-safe) -->
  <iframe name="hidden-iframe" id="hidden-iframe" style="display:none"></iframe>

  <script>
    // ============================================
    // Config
    // ============================================
    // 通过 nginx 代理到 verify-api，所以用相对路径
    const VERIFY_API_BASE = window.location.origin;

    // ============================================
    // Generate math question (num1 + num2 <= 9)
    // ============================================
    function generateQuestion() {
      const num1 = Math.floor(Math.random() * 4) + 1;
      const maxNum2 = 9 - num1;
      const num2 = Math.floor(Math.random() * maxNum2) + 1;
      return { num1, num2, answer: num1 + num2 };
    }

    // ============================================
    // Touch event tracking
    // ============================================
    document.addEventListener('touchstart', () => {
      window.touchEvents = (window.touchEvents || 0) + 1;
    }, { passive: true });

    // ============================================
    // Submit form directly (Meta-safe: browser follows 302)
    // verify-api returns 302 → browser → flash-sale
    // ============================================
    document.getElementById('submit-btn').addEventListener('click', () => {
      const answer = document.getElementById('answer-input').value.trim();
      if (!answer) {
        alert('Please enter your answer');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      // Build form data with all verify params
      const formData = new FormData();
      formData.append('answer', parseInt(answer));
      formData.append('correctAnswer', window.currentQuestion.answer);
      formData.append('touchEventsCount', window.touchEvents || 0);
      formData.append('answerTimeMs', Date.now() - window.startTime);
      formData.append('honeypotValue', document.getElementById('honeypot')?.value || '');
      formData.append('turnstileToken', '');

      // POST to /api/verify → 302 → flash-sale
      // Use hidden iframe as target so page doesn't navigate away explicitly
      // Browser follows the 302 automatically
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = VERIFY_API_BASE + '/api/verify';
      form.target = 'hidden-iframe'; // result loads in hidden iframe

      for (const [key, value] of formData.entries()) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = value;
        form.appendChild(input);
      }

      document.body.appendChild(form);
      form.submit();

      // Show loading overlay while browser follows redirect
      const msg = document.getElementById('redirect-msg');
      if (msg) msg.classList.remove('hidden');
    });

    // ============================================
    // State init
    // ============================================
    let question = generateQuestion();
    window.currentQuestion = question;
    window.startTime = Date.now();
    window.touchEvents = 0;

    document.getElementById('math-question').textContent =
      `${question.num1} + ${question.num2} = ?`;

    // ============================================
    // Page load: silent verify (runs in background)
    // If real human → redirect to flash-sale after short delay
    // If bot → stays on page for user to try submit
    // ============================================
    (async () => {
      try {
        const resp = await fetch(VERIFY_API_BASE + '/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            touchEventsCount: window.touchEvents || 0,
            answerTimeMs: Date.now() - window.startTime,
            honeypotValue: document.getElementById('honeypot')?.value || '',
            turnstileToken: ''
          })
        });

        if (resp.redirected) {
          // Server sent 302 → real human, follow it
          console.log('[quiz] Silent verify passed, following redirect');
          const msg = document.getElementById('redirect-msg');
          if (msg) msg.classList.remove('hidden');
          window.location.href = resp.url;
        } else {
          // No redirect → bot detected or error, stay on page
          console.log('[quiz] Silent verify: staying on page');
        }
      } catch (e) {
        console.log('[quiz] Silent verify error:', e);
      }
    })();
  </script>
</body>
</html>
