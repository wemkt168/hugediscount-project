<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Huge Discount - Quiz</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header {
      text-align: center;
      margin-bottom: 25px;
    }
    .header h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }
    .header p {
      color: #666;
      font-size: 14px;
    }
    .question-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .question-text {
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
    }
    .math-display {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      letter-spacing: 4px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .answer-input {
      width: 100%;
      padding: 15px;
      font-size: 24px;
      text-align: center;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.3s;
    }
    .answer-input:focus {
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .hidden { display: none; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .honeypot { display: none !important; }
    #redirect-msg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      z-index: 9999;
      flex-direction: column;
      gap: 15px;
    }
  </style>
</head>
<body>
  <div id="redirect-msg" class="hidden">
    <div class="spinner"></div>
    <div id="redirect-text"></div>
  </div>

  <div class="card" id="quiz-card">
    <div class="header">
      <h1>🎁 <span id="i18n-title">Huge Discount Event</span></h1>
      <p id="i18n-subtitle">Answer the question to unlock your reward!</p>
    </div>

    <div class="question-box">
      <div class="question-text" id="i18n-question-text">What is the result?</div>
      <div class="math-display" id="math-question">3 + 4 = ?</div>
    </div>

    <div class="input-group">
      <label id="i18n-answer-label">Your Answer</label>
      <input type="number" class="answer-input" id="answer-input" placeholder="?" autocomplete="off">
    </div>

    <!-- Honeypot field - hidden from real users -->
    <div class="honeypot">
      <label>Leave this empty: </label>
      <input type="text" id="honeypot" name="website" autocomplete="off">
    </div>

    <button class="btn" id="submit-btn" data-i18n="submit">Submit Answer</button>
  </div>

  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <div id="loading-text"></div>
  </div>

  <!-- Hidden iframe for form-based redirect (Meta-safe) -->
  <iframe name="hidden-iframe" id="hidden-iframe" style="display:none"></iframe>

  <!-- Turnstile invisible widget container -->
  <div id="turnstile-widget" style="display:none"></div>

  <script>
    // ============================================
    // Config
    // ============================================
    const VERIFY_API_BASE = '__VERIFY_API_BASE__' || window.location.origin;
    const TURNSTILE_SITE_KEY = '0x4AAAAAADFnhqXNOyjaRrQ4';

    // ============================================
    // Multilingual — auto-detect browser language
    // Fallback: English (when lang not in supported list)
    // ============================================
    const I18N = {
      en: {
        title: 'Huge Discount Event',
        subtitle: 'Answer the question to unlock your reward!',
        questionText: 'What is the result?',
        answerLabel: 'Your Answer',
        submitBtn: 'Submit Answer',
        pleaseEnter: 'Please enter your answer',
        verifying: 'Verifying...',
        redirecting: 'Redirecting...',
      },
      'zh-Hans': {
        title: '🎁 超大折扣活动',
        subtitle: '回答问题，解锁您的奖励！',
        questionText: '结果是？',
        answerLabel: '您的答案',
        submitBtn: '提交答案',
        pleaseEnter: '请输入您的答案',
        verifying: '验证中...',
        redirecting: '正在跳转...',
      },
      vi: {
        title: '🎁 Sự Kiện Giảm Giá Lớn',
        subtitle: 'Trả lời câu hỏi để mở khóa phần thưởng của bạn!',
        questionText: 'Kết quả là gì?',
        answerLabel: 'Câu Trả Lời Của Bạn',
        submitBtn: 'Gửi Câu Trả Lời',
        pleaseEnter: 'Vui lòng nhập câu trả lời của bạn',
        verifying: 'Đang xác minh...',
        redirecting: 'Đang chuyển hướng...',
      }
    };

    function getLang() {
      const lang = navigator.language || navigator.userLanguage || 'en';
      if (I18N[lang]) return lang;
      const primary = lang.split('-')[0];
      if (primary === 'zh') return 'zh-Hans';
      if (primary === 'vi') return 'vi';
      return 'en';
    }

    function applyI18n() {
      const lang = getLang();
      const t = I18N[lang];
      document.getElementById('i18n-title').textContent = t.title;
      document.getElementById('i18n-subtitle').textContent = t.subtitle;
      document.getElementById('i18n-question-text').textContent = t.questionText;
      document.getElementById('i18n-answer-label').textContent = t.answerLabel;
      const btn = document.getElementById('submit-btn');
      btn.textContent = t.submitBtn;
      btn.dataset.i18n = t.submitBtn;
      document.getElementById('redirect-text').textContent = t.redirecting;
      document.getElementById('loading-text').textContent = t.verifying;
      document.title = lang === 'zh-Hans' ? '超大折扣 - 答题'
        : lang === 'vi' ? 'Giảm Giá Lớn - Câu Hỏi'
        : 'Huge Discount - Quiz';
    }

    // ============================================
    // Turnstile Invisible Widget
    // ============================================
    window.turnstileToken = '';

    function initTurnstile() {
      if (typeof window.turnstile === 'undefined') {
        setTimeout(initTurnstile, 200);
        return;
      }
      window.turnstile.render('#turnstile-widget', {
        sitekey: TURNSTILE_SITE_KEY,
        theme: 'light',
        callback: function(token) {
          window.turnstileToken = token;
          console.log('[quiz] Turnstile token obtained');
        },
        'error-callback': function() {
          window.turnstileToken = '';
          console.log('[quiz] Turnstile error');
        },
        'expired-callback': function() {
          window.turnstileToken = '';
          console.log('[quiz] Turnstile token expired');
        }
      });
    }

    initTurnstile();

    // ============================================
    // Silent verify on page load
    // POST /api/verify with turnstile token (no answer)
    // If 7 layers pass → browser follows 302 to /flash-sale?token=xxx
    // ============================================
    function doSilentVerify() {
      const turnstileToken = (window.turnstile && window.turnstile.getResponse)
        ? window.turnstile.getResponse()
        : (window.turnstileToken || '');

      const payload = {
        touchEventsCount: window.touchEvents || 0,
        answerTimeMs: Date.now() - window.startTime,
        honeypotValue: document.getElementById('honeypot')?.value || '',
        turnstileToken: turnstileToken
      };

      fetch(VERIFY_API_BASE + '/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        redirect: 'follow'
      })
      .then(resp => {
        if (resp.redirected) {
          // Server returned 302 → browser already followed
          console.log('[quiz] Silent verify: followed redirect to', resp.url);
        } else if (resp.ok) {
          return resp.json();
        }
      })
      .then(data => {
        if (data && data.token && data.pass === true) {
          // Silent verify passed → redirect
          // Redirect timeout: if CF blocks navigation, hide overlay after 3s
          const redirectTimer = setTimeout(() => {
            if (window.location.pathname === '/quiz') {
              const msg = document.getElementById('redirect-msg');
              if (msg) msg.classList.add('hidden');
              console.log('[quiz] Silent redirect timeout, hiding overlay');
            }
          }, 3000);
          window.location.href = '/flash-sale?token=' + encodeURIComponent(data.token);
        }
        // If data.pass === false or no data → stay on page (bot or failed)
      })
      .catch(err => {
        console.error('[quiz] Silent verify error:', err);
        // Stay on page on error
      });
    }

    // DISABLED: silent verify on page load was causing overlay to block user interaction
    // The overlay appeared before user could answer, even when CF challenge passed
    // User must submit answer first → submit handler runs verify → redirect
    // document.addEventListener('DOMContentLoaded', () => {
    //   setTimeout(doSilentVerify, 500);
    // });

    // ============================================
    // Generate math question (num1 + num2 <= 9)
    // ============================================
    function generateQuestion() {
      const num1 = Math.floor(Math.random() * 4) + 1;
      const maxNum2 = 9 - num1;
      const num2 = Math.floor(Math.random() * maxNum2) + 1;
      return { num1, num2, answer: num1 + num2 };
    }

    // ============================================
    // Touch event tracking
    // ============================================
    document.addEventListener('touchstart', () => {
      window.touchEvents = (window.touchEvents || 0) + 1;
    }, { passive: true });

    // ============================================
    // Submit — fetch() → JSON { redirectUrl } → window.location.href
    // 不再使用 form.submit() + hidden iframe
    // ============================================
    document.getElementById('submit-btn').addEventListener('click', () => {
      const answer = document.getElementById('answer-input').value.trim();
      if (!answer) {
        alert(I18N[getLang()].pleaseEnter);
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = I18N[getLang()].verifying;

      const turnstileToken = (window.turnstile && window.turnstile.getResponse)
        ? window.turnstile.getResponse()
        : (window.turnstileToken || '');

      const payload = {
        answer: parseInt(answer),
        correctAnswer: window.currentQuestion.answer,
        touchEventsCount: window.touchEvents || 0,
        answerTimeMs: Date.now() - window.startTime,
        honeypotValue: document.getElementById('honeypot')?.value || '',
        turnstileToken: turnstileToken
      };

      fetch(VERIFY_API_BASE + '/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(resp => resp.json())
      .then(data => {
        if (data && data.token && data.pass === true) {
          // 显示跳转遮罩，然后跳转
          const msg = document.getElementById('redirect-msg');
          if (msg) msg.classList.remove('hidden');
          // Redirect timeout: if CF blocks navigation, overlay would be permanent
          // After 3s if still on same page, hide overlay and let user retry
          const redirectTimer = setTimeout(() => {
            if (window.location.pathname === '/quiz') {
              msg.classList.add('hidden');
              btn.disabled = false;
              btn.textContent = I18N[getLang()].submitBtn;
              console.log('[quiz] Redirect timeout, re-enabling form');
            }
          }, 3000);
          window.location.href = '/flash-sale?token=' + encodeURIComponent(data.token);
        } else {
          // pass=false 或异常：留在答题页
          btn.disabled = false;
          btn.textContent = I18N[getLang()].submitBtn;
          console.log('[quiz] verify fail, staying on page');
        }
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = I18N[getLang()].submitBtn;
        console.error('[quiz] Verify error:', err);
      });
    });

    // ============================================
    // State init
    // ============================================
    let question = generateQuestion();
    window.currentQuestion = question;
    window.startTime = Date.now();
    window.touchEvents = 0;

    document.getElementById('math-question').textContent =
      `${question.num1} + ${question.num2} = ?`;

    applyI18n();
  </script>
</body>
</html>
