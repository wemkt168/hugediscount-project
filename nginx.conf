worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream quiz-front {
    server localhost:3000;
  }

  upstream verify-api {
    server localhost:3001;
  }

  upstream flash-sale {
    server localhost:3002;
  }

  server {
    listen 80;
    server_name _;

    # Quiz page
    location /quiz {
      proxy_pass http://quiz-front;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Quiz page also at root (for direct access)
    location / {
      proxy_pass http://quiz-front;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Verify API
    location /api/verify {
      proxy_pass http://verify-api/api/verify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Flash sale redirect
    location /flash-sale {
      proxy_pass http://flash-sale/flash-sale;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
